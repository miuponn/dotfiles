include themes/zen-pond.conf
include 

font_family      JetBrainsMono Nerd Font Mono
font_size        13.0

background_opacity 0.7
background_blur 20

window_padding_width 30

cursor_shape beam
cursor_trail 10
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 0
cursor_blink_interval 0.5

macos_colorspace displayp3

# hide titlebar + no border
hide_window_decorations titlebar-only
window_border_width 0

macos_option_as_alt yes
confirm_os_window_close -1
mouse_hide_while_typing left

notify_on_cmd_finish invisible

# scrollback
# scrollback_lines 5000
# scrollback_pager_history_size 10

# symbol map 
symbol_map U+e000-U+e00a Symbols Nerd Font Mono                                                                                             
symbol_map U+ea60-U+ebeb Symbols Nerd Font Mono                                                                                             
symbol_map U+e0a0-U+e0c8 Symbols Nerd Font Mono
symbol_map U+e0ca-U+e0ca Symbols Nerd Font Mono                                                                                             
symbol_map U+e0cc-U+e0d7 Symbols Nerd Font Mono                                                                                             
symbol_map U+e200-U+e2a9 Symbols Nerd Font Mono                                                                                             
symbol_map U+e300-U+e3e3 Symbols Nerd Font Mono                                                                                             
symbol_map U+e5fa-U+e6b5 Symbols Nerd Font Mono                                                                                             
symbol_map U+e700-U+e7c5 Symbols Nerd Font Mono
symbol_map U+ed00-U+efc1 Symbols Nerd Font Mono                                                                                             
symbol_map U+f000-U+f2ff Symbols Nerd Font Mono                                                                                             
symbol_map U+f300-U+f372 Symbols Nerd Font Mono
symbol_map U+f400-U+f533 Symbols Nerd Font Mono                                                                                             
symbol_map U+f0001-U+f1af0 Symbols Nerd Font Mono
