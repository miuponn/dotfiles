[mgr]
ratio = [1, 3, 4]
sort_by = "natural"
linemode = "mtime"
scrolloff = 5
mouse_events = [ "click", "scroll" ]
title_format = ""

[preview]
image_delay = 0
image_filter = "lanczos3"

[opener]
edit = [
    { run = 'nvim %s', desc = "Edit in nvim", block = true, for = "macos" },
]
play = [
    { run = 'open -a IINA %s', desc = "Play in IINA", orphan = true, for = "macos" },
]
peek = [
    { run = 'qlmanage -p %s >/dev/null 2>&1', desc = "QuickLook", orphan = true, for = "macos" },
]

[open]
prepend_rules = [
    { mime = "application/{yaml,toml,typescript,sql}", use = "edit" },
    { mime = "image/*", use = "peek" },
    { name = "*.kdl", use = "edit" },
]
