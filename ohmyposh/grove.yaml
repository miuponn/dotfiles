# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

console_title_template: '{{ .Shell }} in {{ .Folder }}'
version: 4
final_space: true
palette:
    pill-bg: '#263d42'
    pill-fg: '#5a7880'
    teal: '#58b0b8'
    red: '#e878a8'
    green: '#78b098'
    blue: '#5090b0' 
    peach: '#e89878'
    yellow: '#e8c888'
    lavender: '#a890c0'
    white: '#e4ebe4'
secondary_prompt:
    template: "  \U000F17A9 "
    background: transparent
    foreground: p:teal
transient_prompt:
    template: "{{ .PWD }} \uf0da "
    background: transparent
    foreground_templates:
      - '{{ if gt .Code 0 }}p:red{{ else }}p:green{{ end }}'
blocks:
    - type: prompt
      alignment: left
      segments:
        - type: session
          style: diamond
          leading_diamond: "\ue0b6"
          trailing_diamond: "\ue0b4"
          foreground: p:teal
          background: p:pill-bg
          template: " {{ if .SSHSession }}\uea7a{{ else if .Root }}{{ end }}\U000F032A  {{ .UserName }} "
        - type: text
          style: plain
          background: transparent
          foreground: transparent
          template: " "
        - type: path
          style: diamond
          leading_diamond: "\ue0b6"
          trailing_diamond: "\ue0b4"
          foreground: p:green
          background: p:pill-bg
          template: ' {{ path .Path .Location }} '
          options:
            style: agnoster_short
            max_depth: 2
            hide_root_location: true
        - type: git
          style: plain
          foreground: p:pill-fg
          background: transparent
          template: >- 
            {{ " " }}{{ .HEAD }}
            {{- if or (.Working.Changed) (.Staging.Changed) }}*{{ end }}
            {{- if gt .Behind 0 }} {{ if and (gt .Ahead 0) }}⇣{{ .Behind }}{{ else }}<p:teal>⇣{{ .Behind }}</>{{ end }}{{ end }}
            {{- if gt .Ahead 0 }} {{ if and (gt .Behind 0) }}⇡{{ .Ahead }}{{ else }}<p:teal>⇡{{ .Ahead }}</>{{ end }}{{ end }}
          foreground_templates:
            - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:red{{ end }}'
          options:
            cache_duration: none
            branch_icon: ''
            branch_gone_icon: 'x'
            commit_icon: '#'
            fetch_status: true
    - type: prompt
      alignment: right
      segments: 
        - type: executiontime
          style: plain
          foreground: p:blue
          background: transparent
          template: '⏱ {{ .FormattedMs }} '
          options:
            threshold: 1000
            style: austin
        - type: time
          style: diamond
          leading_diamond: "\ue0b6"
          trailing_diamond: "\ue0b4"
          foreground: p:lavender
          background: p:pill-bg
          template: " {{ .CurrentDate | date .Format }} \U000F0674 "
          options:
            time_format: Kitchen
    - type: prompt
      alignment: left
      newline: true
      segments:
        - type: status
          style: plain
          background: transparent
          template: " \U000F17A9 "
          foreground_templates:
            - '{{ if gt .Code 0 }}p:red{{ else }}p:green{{ end }}'
          options:
            cache_duration: none
            always_enabled: true
    - type: rprompt
      overflow: hide
      segments:
        - type: python
          style: diamond
          leading_diamond: "\ue0b6"
          trailing_diamond: "\ue0b4"
          foreground: p:yellow
          background: p:pill-bg
          template: " \U000f0320 {{ .Venv }} "
          options:
            display_mode: environment
            fetch_virtual_env: true
            fetch_version: false
        - type: python
          style: plain
          foreground: p:yellow
          background: transparent
          template: " {{ if not .Venv }}\U000f0320{{ end }} "
          options:
            display_mode: files
            fetch_virtual_env: true
            fetch_version: false
        - type: node
          style: plain
          foreground: p:green
          background: transparent
          template: " \U000F0399 "
          options:
            fetch_version: false
        - type: go
          style: plain
          template: "\U000F07D3"
          foreground: p:blue
          background: transparent
          options:
            fetch_version: false
        - type: lua
          style: plain
          template: "\U000F08B1"
          foreground: p:white
          background: transparent
          options:
            fetch_version: false
