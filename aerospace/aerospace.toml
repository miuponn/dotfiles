config-version = 2

start-at-login = true

after-startup-command = [
    'exec-and-forget borders active_color=0xff58b0b8 inactive_color=0xff5a7880 width=2.5 style=round hidpi=on'
]

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 20
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = true

persistent-workspaces = ['vibe', 'code', 'ref', 'design', 'social', 'vault', 'system']

exec-on-workspace-change = ['/bin/bash', '-c',
    '/opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE'
]

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 4
inner.vertical = 4
outer.left = 4
outer.bottom = 4
outer.top = [
    { monitor."built-in" = 32 },
    { monitor."viotek" = 60 },
    32
]
outer.right = 4

[workspace-to-monitor-force-assignment]
code = ['secondary', 'main']
design = ['secondary', 'main']
vault = ['secondary', 'main']
system = ['secondary', 'main']

[[on-window-detected]]
if.app-id = 'com.figma.Desktop'
run = 'move-node-to-workspace design'

[[on-window-detected]]
if.app-id = 'org.blenderfoundation.blender'
run = 'move-node-to-workspace design'

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace vault'

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = 'move-node-to-workspace social'

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace social'

[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = 'move-node-to-workspace social'

[[on-window-detected]]
if.app-id = 'com.apple.FaceTime'
run = 'move-node-to-workspace social'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'move-node-to-workspace system'

[[on-window-detected]]
if.app-id = 'com.apple.Photos'
run = 'move-node-to-workspace system'

[[on-window-detected]]
if.app-id = 'com.apple.Notes'
run = 'move-node-to-workspace system'

[mode.main.binding]
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

alt-f = 'fullscreen'
alt-m = 'macos-native-minimize'

alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

alt-1 = 'workspace vibe'
alt-2 = 'workspace code'
alt-3 = 'workspace ref'
alt-4 = 'workspace design'
alt-5 = 'workspace social'
alt-6 = 'workspace vault'
alt-7 = 'workspace system'

alt-shift-1 = ['move-node-to-workspace vibe --focus-follows-window']
alt-shift-2 = ['move-node-to-workspace code --focus-follows-window']
alt-shift-3 = ['move-node-to-workspace ref --focus-follows-window']
alt-shift-4 = ['move-node-to-workspace design --focus-follows-window']
alt-shift-5 = ['move-node-to-workspace social --focus-follows-window']
alt-shift-6 = ['move-node-to-workspace vault --focus-follows-window']
alt-shift-7 = ['move-node-to-workspace system --focus-follows-window']

alt-tab = 'workspace-back-and-forth'

alt-shift-f = 'layout floating tiling'

cmd-alt-ctrl-shift-t = 'exec-and-forget open -na /Applications/kitty.app'
cmd-alt-ctrl-shift-b = 'exec-and-forget open -a "Google Chrome"'
cmd-alt-ctrl-shift-y = 'exec-and-forget open -na /Applications/kitty.app --args yazi'
cmd-alt-ctrl-shift-g = 'exec-and-forget open -na /Applications/kitty.app --args lazygit'

cmd-alt-ctrl-shift-v = 'exec-and-forget /opt/homebrew/bin/kitty -e /bin/zsh -lc "zellij attach vibe 2>/dev/null || zellij -l vibe -s vibe"'
cmd-alt-ctrl-shift-c = 'exec-and-forget /opt/homebrew/bin/kitty -e /bin/zsh -lc "zellij attach code 2>/dev/null || zellij -l code -s code"'
cmd-alt-ctrl-shift-d = 'exec-and-forget /opt/homebrew/bin/kitty -e /bin/zsh -lc "zellij attach dash 2>/dev/null || zellij -l dash -s dash"'

alt-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']
